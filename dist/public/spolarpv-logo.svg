    <circle cx="0" cy="0" r="11.5" fill="#00A651"/>
    <!-- Grid lines -->
    <line x1="-11.5" y1="0" x2="11.5" y2="0" stroke="#FFFFFF" stroke-width="1.4"/>
    <line x1="0" y1="-11.5" x2="0" y2="11.5" stroke="#FFFFFF" stroke-width="1.4"/>
    <line x1="-8" y1="-5.5" x2="8" y2="-5.5" stroke="#FFFFFF" stroke-width="0.9"/>
    <line x1="-8" y1="5.5" x2="8" y2="5.5" stroke="#FFFFFF" stroke-width="0.9"/>
    <line x1="-5.5" y1="-11.5" x2="-5.5" y2="11.5" stroke="#FFFFFF" stroke-width="0.9"/>
    <line x1="5.5" y1="-11.5" x2="5.5" y2="11.5" stroke="#FFFFFF" stroke-width="0.9"/>
  </g>
  <!-- SpolarPV text -->
  <text x="82" y="38" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="26" fill="#FFFFFF" letter-spacing="0.5">SpolarPV</text>
  <!-- Tagline -->
