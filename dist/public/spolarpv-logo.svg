<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 88" width="240" height="88">
  <!-- Sunburst icon -->
  <g transform="translate(40,44)">
    <!-- Rays -->
    <line x1="0" y1="-30" x2="0" y2="-20" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="0" y1="30" x2="0" y2="20" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-30" y1="0" x2="-20" y2="0" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="30" y1="0" x2="20" y2="0" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-21.2" y1="-21.2" x2="-14.1" y2="-14.1" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="21.2" y1="21.2" x2="14.1" y2="14.1" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="21.2" y1="-21.2" x2="14.1" y2="-14.1" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-21.2" y1="21.2" x2="-14.1" y2="14.1" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
